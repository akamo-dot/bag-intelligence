name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import time
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          # 404を回避するため、最も軽量で新しいHaikuモデルを指定
          MODEL_NAME = "claude-3-5-haiku-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""

          print(f"🚀 Starting AI Trend Research using {MODEL_NAME}...")

          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  response = client.messages.create(
                      model=MODEL_NAME,
                      max_tokens=1000,
                      messages=[{
                          "role": "user", 
                          "content": f"Analyze the current top 3 bag trends in {country}. Return only HTML format (div tags)."
                      }]
                  )
                  report_content += f"<section style='margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:20px;'><h2>{country} Trend</h2>" + response.content[0].text + "</section>"
                  print(f"✅ {country} Success")
                  time.sleep(5) 
              except Exception as e:
                  print(f"❌ Error in {country}: {e}")

          full_html = f"""
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <title>Weekly Bag Intelligence Report</title>
              <style>
                  body {{ font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 40px; color: #333; background-color: #fff; }}
                  h1 {{ text-align: center; border-bottom: 3px solid #000; padding-bottom: 10px; }}
                  h2 {{ color: #d4af37; border-left: 5px solid #d4af37; padding-left: 15px; }}
                  section {{ margin-top: 30px; }}
              </style>
          </head>
          <body>
              <h1>Weekly Bag Intelligence Report</h1>
              <p style="text-align:right;">Updated: {time.strftime('%Y-%m-%d')}</p>
              {report_content}
          </body>
          </html>
          """

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✨ index.html has been generated.")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Update Report with Haiku model"
