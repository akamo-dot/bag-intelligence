name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          # 名前が「Bag」でも「BAG」でも、どちらか入っている方を採用します
          KEY_V1: ${{ secrets.Bag }}
          KEY_V2: ${{ secrets.BAG }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time
          from anthropic import Anthropic
          
          # 登録されている可能性のあるすべての名前をチェック
          api_key = os.environ.get("KEY_V1") or os.environ.get("KEY_V2")
          
          if not api_key:
              print("❌ Error: GitHub Secret 'Bag' or 'BAG' not found.")
              exit(1)
              
          client = Anthropic(api_key=api_key)
          MODEL = "claude-3-5-sonnet-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report = ""
          
          print(f"🚀 Starting Research with validated key...")
          
          for c in countries:
              print(f"--- {c} ---")
              try:
                  res = client.messages.create(
                      model=MODEL,
                      max_tokens=1000,
                      messages=[{"role": "user", "content": f"Analyze 3 bag trends in {c} for 2026. HTML div tags only."}]
                  )
                  report += f"<section><h2>{c}</h2>{res.content[0].text}</section>"
                  print(f"✅ {c} Success")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {c} Fail: {e}")
          
          if not report:
              print("Critical Error: AI generation failed.")
              exit(1)
              
          full_html = f"<html><body style='font-family:sans-serif;padding:40px;'><h1>Weekly Bag Report</h1>{report}</body></html>"
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✨ index.html generated!")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Fixing secret name sensitivity" || echo "No changes"
          git push
