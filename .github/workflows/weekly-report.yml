# ── 各国セクションのHTML生成（リトライ強化）────────────
def generate_country_section(country, max_retries=3):
    cid = country["id"]
    flag = country["flag"]
    name = country["name"]
    queries = country["queries"]

    search_list = "\n".join([
        f'- {CAT_LABEL[cat]}（{cat}）: "{q}"'
        for cat, q in queries.items()
    ])

    prompt = f"""
{flag} {name}のバッグトレンドレポートを生成してください。

## 手順
1. 以下の検索クエリで最新情報を収集する
{search_list}

2. 各カテゴリ2件程度の記事を選び、指定のHTML形式で出力する

## 出力ルール
- HTMLのみ出力（コードブロック不要）
- 説明文はすべて日本語
- 画像URL/記事URLは実在するものを使用。不明ならimgタグ省略
- SPECIALカテゴリはユニークなバッグを特集

今日の日付: {TODAY_JP}
"""

    for attempt in range(max_retries):
        try:
            print(f"  🔍 {flag} {name} を調査中...（試行 {attempt + 1}/{max_retries}）")
            # max_tokensを少し下げて負荷を調整
            response = client.messages.create(
                model="claude-sonnet-4-20250514",
                max_tokens=4500,
                tools=[{"type": "web_search_20250305", "name": "web_search"}],
                messages=[{"role": "user", "content": prompt}]
            )
            html = ""
            for block in response.content:
                if block.type == "text":
                    html += block.text
            
            # 不要なマークダウン記法を削除
            html = re.sub(r'^```html\s*', '', html.strip())
            html = re.sub(r'\s*```$', '', html.strip())
            return html

        except anthropic.RateLimitError as e:
            # 1分あたりの制限にかかった場合、長めに待機
            wait = 150 * (attempt + 1)
            print(f"  ⚠️ レート制限(429)を検知。{wait}秒待機して再試行します...")
            time.sleep(wait)

        except Exception as e:
            print(f"  ❌ エラー発生: {e}")
            if attempt < max_retries - 1:
                time.sleep(60)

    return f'<p style="color:#888;padding:20px;">⚠️ {name}のデータ取得に失敗しました。時間をおいて再実行してください。</p>'


