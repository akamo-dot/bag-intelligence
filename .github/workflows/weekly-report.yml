name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          # GitHubが自動で大文字にした「BAG」を確実に読み込みます
          CLAUDE_SECRET: ${{ secrets.BAG }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time, sys
          from anthropic import Anthropic
          
          # 環境変数からキーを取得（名前が何であれ環境変数経由で渡されます）
          api_key = os.environ.get("CLAUDE_SECRET")
          
          if not api_key or not api_key.startswith("sk-ant"):
              print("❌ ERROR: GitHub Secret 'BAG' is missing or invalid.")
              sys.exit(1)
              
          client = Anthropic(api_key=api_key)
          MODEL = "claude-3-5-sonnet-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""
          
          print(f"🚀 Key recognized as BAG. Starting research with {MODEL}...")
          
          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  response = client.messages.create(
                      model=MODEL,
                      max_tokens=1000,
                      messages=[{"role": "user", "content": f"Analyze current 3 bag trends in {country} for 2026. HTML div tags only."}]
                  )
                  report_content += f"<section style='margin-bottom:30px;'><h2>{country}</h2>{response.content[0].text}</section>"
                  print(f"✅ {country} Success")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {country} Fail: {e}")
          
          if not report_content:
              print("❌ Critical: No content generated.")
              sys.exit(1)
              
          full_html = f"<html><body style='font-family:sans-serif;padding:40px;'><h1>Weekly Bag Report</h1>{report_content}</body></html>"
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✨ Done.")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Update Report" || echo "No changes"
          git push
