name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import time
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          # 全ユーザーに100%解放されている最安定モデル
          MODEL_NAME = "claude-3-haiku-20240307"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""

          print(f"🚀 Testing with stable model: {MODEL_NAME}...")

          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  response = client.messages.create(
                      model=MODEL_NAME,
                      max_tokens=1000,
                      messages=[{
                          "role": "user", 
                          "content": f"Briefly list 3 bag trends in {country}. HTML div format only."
                      }]
                  )
                  report_content += f"<div><h2>{country}</h2>" + response.content[0].text + "</div>"
                  print(f"✅ {country} Success")
                  time.sleep(2) 
              except Exception as e:
                  print(f"❌ Error in {country}: {e}")

          full_html = f"<html><body><h1>Bag Report</h1>{report_content}</body></html>"
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✨ Generated.")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Testing with ultra-stable model" || echo "No changes"
          git push
