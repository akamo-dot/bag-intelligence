name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          # GitHubが強制大文字にした「BAG」を正確に読み込み
          CLAUDE_KEY: ${{ secrets.BAG }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time, sys
          from anthropic import Anthropic
          
          api_key = os.environ.get("CLAUDE_KEY")
          client = Anthropic(api_key=api_key)
          
          # 【重要】最も汎用的なモデル名に変更し、404を回避します
          MODEL = "claude-3-5-sonnet-latest"
          
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""
          
          print(f"🚀 Final Attempt with {MODEL}...")
          
          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  # メッセージを極限まで短くして、まず疎通を確認
                  response = client.messages.create(
                      model=MODEL,
                      max_tokens=500,
                      messages=[{"role": "user", "content": f"3 bag trends in {country} 2026. HTML only."}]
                  )
                  report_content += f"<h2>{country}</h2>{response.content[0].text}"
                  print(f"✅ {country} Success")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {country} Fail. Detail: {e}")
          
          if not report_content:
              print("!!! TOTAL FAILURE !!!")
              print("💡 対策: もしこれが404なら、Anthropic側でTier 1の反映に数時間かかっています。")
              print("💡 または、APIキーを一度消して、再度『別の名前』で作ってみてください。")
              sys.exit(1)
              
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(f"<html><body>{report_content}</body></html>")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Ultra stable model check" || echo "No changes"
          git push
