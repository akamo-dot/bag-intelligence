name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time
          from anthropic import Anthropic
          
          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          # Tier 1で最も安定している Sonnet 3.5 を指定
          MODEL = "claude-3-5-sonnet-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report = ""
          
          print(f"🚀 Research Start: {MODEL}")
          
          for c in countries:
              print(f"--- {c} ---")
              try:
                  res = client.messages.create(
                      model=MODEL,
                      max_tokens=800,
                      messages=[{"role": "user", "content": f"Trend bags in {c} 2026. HTML div only."}]
                  )
                  report += f"<h2>{c}</h2>{res.content[0].text}"
                  print(f"✅ {c} OK")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {c} Fail: {e}")
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(f"<html><body><h1>Weekly Report</h1>{report}</body></html>")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Update Report" || echo "No changes"
          git push
