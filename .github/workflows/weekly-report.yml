name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import time
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          # 確実に存在するモデル名に変更
          MODEL_NAME = "claude-3-sonnet-20240229"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""

          print(f"🚀 Starting AI Trend Research using {MODEL_NAME}...")

          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  response = client.messages.create(
                      model=MODEL_NAME,
                      max_tokens=1000,
                      messages=[{
                          "role": "user", 
                          "content": f"Analyze the current top 3 bag trends in {country}. Return only HTML format (div tags)."
                      }]
                  )
                  report_content += f"<section><h2>{country} Trend</h2>" + response.content[0].text + "</section>"
                  print(f"✅ {country} Success")
                  time.sleep(5) 
              except Exception as e:
                  print(f"❌ Error in {country}: {e}")

          full_html = f"<html><body style='font-family:sans-serif; padding:40px;'><h1>Weekly Bag Report</h1>{report_content}</body></html>"

          with open("index.html", "w") as f:
              f.write(full_html)
          print("✨ index.html has been generated.")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Fix model name to stable version" || echo "No changes"
          git push
