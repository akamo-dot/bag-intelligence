- name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import time
          from anthropic import Anthropic

          client = Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report_content = ""

          print("🚀 Starting AI Trend Research...")

          for country in countries:
              print(f"--- Investigating {country} ---")
              try:
                  # モデル名を 'latest' に修正
                  response = client.messages.create(
                      model="claude-3-5-sonnet-latest",
                      max_tokens=1000,
                      messages=[{
                          "role": "user", 
                          "content": f"Analyze the current top 3 bag trends in {country} for this week. Return only HTML format (div tags)."
                      }]
                  )
                  report_content += f"<section><h2>{country} Trend</h2>" + response.content[0].text + "</section>"
                  print(f"✅ {country} Success")
                  time.sleep(5) 
              except Exception as e:
                  print(f"❌ Error in {country}: {e}")

          full_html = f"<html><body style='font-family:sans-serif; padding:40px;'><h1>Weekly Bag Report</h1>{report_content}</body></html>"

          with open("index.html", "w") as f:
              f.write(full_html)
          print("✨ index.html has been generated.")
          EOF
