name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          # 余計なスペースや括弧を排除した正確な記述です
          NEW_KEY: ${{ secrets.BAG }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time
          from anthropic import Anthropic
          
          # 環境変数 NEW_KEY から正確に取得します
          api_key = os.environ.get("NEW_KEY")
          client = Anthropic(api_key=api_key)
          
          MODEL = "claude-3-5-sonnet-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report = ""
          
          print(f"🚀 Research Start using BAG secret...")
          
          for c in countries:
              print(f"--- Investigating {c} ---")
              try:
                  res = client.messages.create(
                      model=MODEL,
                      max_tokens=1000,
                      messages=[{"role": "user", "content": f"Analyze the current top 3 bag trends in {c} for 2026. Return only HTML format (div tags) with a stylish design."}]
                  )
                  report += f"<section style='margin-bottom:40px; border-bottom:1px solid #ddd; padding-bottom:20px;'><h2>{c} Trend</h2>{res.content[0].text}</section>"
                  print(f"✅ {c} Success")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {c} Fail: {e}")
          
          full_html = f"<html><body style='font-family:sans-serif;padding:40px;'><h1>Weekly Bag Report</h1>{report}</body></html>"
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(full_html)
          print("✨ index.html generated.")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Final fix for API key syntax" || echo "No changes"
          git push
