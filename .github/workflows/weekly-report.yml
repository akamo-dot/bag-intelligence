name: Global Bag Trend Report
on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate report with Claude
        env:
          # GitHubに登録されている2つの名前、両方を環境変数に入れます
          OLD_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEW_KEY: ${{ secrets.BAG }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import os, time
          from anthropic import Anthropic
          
          # 新しい方のキー（BAG）を優先的に使い、なければ古い方を使います
          api_key = os.environ.get("NEW_KEY") or os.environ.get("OLD_KEY")
          client = Anthropic(api_key=api_key)
          
          # モデル名は Tier 1 で最も確実な Sonnet 3.5 を指定
          MODEL = "claude-3-5-sonnet-20241022"
          countries = ["France", "USA", "Japan", "Italy", "UK"]
          report = ""
          
          print(f"🚀 Research Start! Using key from BAG secret.")
          
          for c in countries:
              print(f"--- {c} ---")
              try:
                  res = client.messages.create(
                      model=MODEL,
                      max_tokens=800,
                      messages=[{"role": "user", "content": f"Trend bags in {c} 2026. HTML div only."}]
                  )
                  report += f"<div style='margin-bottom:20px;'><h2>{c}</h2>{res.content[0].text}</div>"
                  print(f"✅ {c} Success!")
                  time.sleep(2)
              except Exception as e:
                  print(f"❌ {c} Error: {e}")
          
          if not report:
              report = "<p>調査に失敗しました。APIの設定を確認してください。</p>"
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(f"<html><body style='font-family:sans-serif;padding:40px;'><h1>Weekly Bag Report</h1>{report}</body></html>")
          print("✨ index.html has been generated.")
          PYTHON_SCRIPT

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Update Report using NEW_KEY logic" || echo "No changes"
          git push
